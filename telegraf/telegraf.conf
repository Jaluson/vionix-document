[agent]
  interval = "10s"
  round_interval = true
  flush_interval = "10s"

# ============================================================
# Inputs - 所有数据源统一 measurement: device_metrics
# ============================================================

# ── MQTT（IoT 设备上报）──
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "vionix/+/+",
    "sensors/#"
  ]
  data_format = "json"
  name_override = "device_metrics"
  # MQTT JSON 示例:
  # Topic: sensors/room1
  # {"temperature": 25.3, "humidity": 60.5, "light": 320}

# ── Modbus TCP（工业 PLC / 传感器）──
# [[inputs.modbus]]
#   name_override = "device_metrics"
#   controller = "tcp://192.168.1.100:502"
#   interval = "1s"
#   [[inputs.modbus.request]]
#     slave_id = 1
#     byte_order = "ABCD"
#     register = "holding"
#     [[inputs.modbus.request.field]]
#       name = "temperature"
#       address = 0
#       type = "FLOAT32"
#     [[inputs.modbus.request.field]]
#       name = "voltage"
#       address = 2
#       type = "FLOAT32"
#     [[inputs.modbus.request.field]]
#       name = "current"
#       address = 4
#       type = "FLOAT32"
#   # 采集结果等同于 JSON: {"temperature": 22.1, "voltage": 220.5, "current": 5.2}

# ── HTTP 推送（应用主动上报）──
# [[inputs.http_listener_v2]]
#   name_override = "device_metrics"
#   listen = ":8080"
#   data_format = "json"
#   # POST http://telegraf-host:8080/write
#   # Body: {"temperature": 26.0, "pressure": 1013.2}

# ============================================================
# Output - 所有输入统一写入 device_raw
# ============================================================

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "my-super-secret-token"
  organization = "vionix"
  bucket = "device_raw"
