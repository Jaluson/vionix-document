[agent]
  interval = "10s"
  round_interval = true
  flush_interval = "10s"
  omit_hostname = true

# ============================================================
# Inputs - 所有数据源统一 measurement: device_metrics
# ============================================================

# ── MQTT（IoT 设备上报）──
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "vionix/+/+/metrics",
    "sensors/+"
  ]
  data_format = "json"
  name_override = "device_metrics"
  topic_tag = ""
  tag_keys = ["source"]
  json_time_key = "timestamp"
  json_time_format = "2006-01-02T15:04:05Z07:00"
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "vionix/+/+/metrics"
    tags = "_/tenant_id/device_id/_"
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "sensors/+"
    tags = "_/device_id"
  # MQTT JSON 示例:
  # Topic: vionix/1/sensor-001/metrics
  # {"timestamp":"2026-05-26T10:01:00Z","source":"mqtt","temperature":25.3,"humidity":60.5,"light":320}
  # 开发兼容 Topic: sensors/sensor-001，tenant_id 使用 VIONIX_DEV_TENANT_ID。

# ── Modbus TCP（工业 PLC / 传感器）──
# [[inputs.modbus]]
#   name_override = "device_metrics"
#   controller = "tcp://192.168.1.100:502"
#   interval = "1s"
#   [[inputs.modbus.request]]
#     slave_id = 1
#     byte_order = "ABCD"
#     register = "holding"
#     [[inputs.modbus.request.field]]
#       name = "temperature"
#       address = 0
#       type = "FLOAT32"
#     [[inputs.modbus.request.field]]
#       name = "voltage"
#       address = 2
#       type = "FLOAT32"
#     [[inputs.modbus.request.field]]
#       name = "current"
#       address = 4
#       type = "FLOAT32"
#   # 采集结果等同于 JSON: {"temperature": 22.1, "voltage": 220.5, "current": 5.2}

# ── HTTP 推送（应用主动上报）──
# [[inputs.http_listener_v2]]
#   name_override = "device_metrics"
#   listen = ":8080"
#   data_format = "json"
#   # POST http://telegraf-host:8080/write
#   # Body: {"temperature": 26.0, "pressure": 1013.2}

# ============================================================
# Output - 所有输入统一写入 device_raw
# ============================================================

[[processors.defaults]]
  [processors.defaults.tags]
    tenant_id = "${VIONIX_DEV_TENANT_ID}"
    source = "mqtt"

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET}"
